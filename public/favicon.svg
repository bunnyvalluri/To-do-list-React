<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Main Gradient Background -->
    <linearGradient id="favicon-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Glass Overlay Gradient -->
    <linearGradient id="glass-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Checkmark Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#ffffff" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Base Rounded Card Container -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#favicon-bg)" filter="url(#glow)" />

  <!-- Glass Inner Highlight -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#glass-shine)" />

  <!-- Subtle Border Stroke -->
  <rect x="33" y="33" width="446" height="446" rx="111" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="4" />

  <!-- Outer Checkbox Rounded Shell -->
  <rect x="112" y="112" width="288" height="288" rx="72" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-opacity="0.5" stroke-width="14" />

  <!-- Checkmark Graphic -->
  <path d="M172 264 L236 328 L344 192" fill="none" stroke="#ffffff" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Top Right Sparkle Accent -->
  <circle cx="390" cy="122" r="16" fill="#ffffff" opacity="0.9" />
  <circle cx="390" cy="122" r="28" fill="#ffffff" opacity="0.3" />
</svg>